name: Goal
description: Create a verifiable Goal workflow issue
title: "[Goal] "
labels:
  - goal
body:
  - type: markdown
    attributes:
      value: |
        Use this form for one coherent Goal workflow objective with a clear stopping condition.

        A good goal is bigger than one prompt but smaller than an open-ended backlog. It should tell the workflow what to do, what not to change, how to prove progress, and when to stop as blocked instead of guessing.

        If the goal needs a helper script, fixture, package script, CI target, or other setup before doneness can be judged, create that setup change first.

  - type: input
    id: goal
    attributes:
      label: Goal
      description: State the desired end state in one sentence.
      placeholder: "Refine fast-file-upload into a cleaner, verified file handoff page."
    validations:
      required: true

  - type: textarea
    id: completion-contract
    attributes:
      label: Completion Contract
      description: Define exactly when Goal should add `goal-completed` and remove `goal`.
      placeholder: |
        Goal is complete only when:
        - Front-end copy is shorter and clearer.
        - Core upload, listing, preview, download, delete, and token flows are verified.
        - The preview site loads and pytest passes.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence / Verification
      description: List the commands, scripts, artifacts, screenshots, logs, or checks that prove the completion contract.
      placeholder: |
        Run from the repository root:

        ```bash
        pytest
        curl -s http://127.0.0.1:8083/api/health
        ```
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope and Constraints
      description: Say what the workflow may change and what must not change or regress.
      placeholder: |
        The workflow may change:
        - web/**
        - app/**
        - tests/**

        The workflow must preserve:
        - upload, download, delete behavior
        - optional token protection
        - lightweight deployment model
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context To Read First
      description: Point the workflow at the files and docs it should inspect before changing code.
      placeholder: |
        - README.md
        - web/index.html
        - app/main.py
        - app/storage.py
        - tests/test_app.py
    validations:
      required: true

  - type: textarea
    id: iteration-policy
    attributes:
      label: Iteration Policy
      description: Explain how the workflow should choose each next checkpoint and report progress.
      placeholder: |
        Work in the smallest end-to-end checkpoint available. After each run, record what changed, what was verified, what remains, and the next smallest improvement.
    validations:
      required: true

  - type: textarea
    id: blocked-stop-condition
    attributes:
      label: Blocked Stop Condition
      description: Define when the workflow should stop substantive work and comment instead of guessing.
      placeholder: |
        Stop and report when GitHub authentication, unavailable tooling, or missing product decisions prevent defensible progress.
    validations:
      required: true
